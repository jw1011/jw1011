name: Update TryHackMe Badge

on:
  schedule:
    - cron: "0 */12 * * *" # 12시간마다 실행
  workflow_dispatch:      # 수동 실행 가능

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 푸시 권한 명시

    steps:
      - uses: actions/checkout@v4

      - name: Fetch THM Badge
        run: |
          mkdir -p assets
          # 유저네임 JUWON의 배지 이미지를 직접 가져옵니다.
          # API가 불안정할 경우를 대비해 공식 배지 URL을 사용합니다.
          curl -L "https://tryhackme-badges.s3.amazonaws.com/JUWON.png" -o assets/thm.png
          curl -L "https://avatars.githubusercontent.com/u/9919?s=200&v=4" -o assets/thm.png
          
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/thm.png
          # 변경사항이 있을 때만 커밋
          if ! git diff --cached --quiet; then
            git commit -m "chore: update TryHackMe badge stats"
            git push
          else
            echo "No changes in badge image."
          fi
